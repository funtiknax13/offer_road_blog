baseURL = 'https://offerroad.ru/'
locale = 'ru-RU'
defaultContentLanguage = 'ru'
title = 'Путь к офферу'
theme = 'PaperMod'
enableRobotsTXT = true
enableEmoji = true
pygmentsUseClasses = true

[pagination]
  pagerSize = 10

[minify]
  disableXML = true

[params]
  env = "production"
  description = "Личный путь поиска работы и разбор рынка труда в России: IT и смежные специальности, удалённая работа и фриланс. Конкретные цифры и опыт вместо общих советов."
  keywords = ["поиск работы", "рынок труда", "IT вакансии", "удалённая работа", "фриланс", "трудоустройство в России"]
  author = "Автор блога"
  DateFormat = "2 January 2006"
  defaultTheme = "auto"
  disableThemeToggle = false
  ShowReadingTime = true
  ShowShareButtons = true
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowWordCount = true
  ShowRssButtonInSectionTermList = true
  ShowFullTextinRSS = true
  UseHugoToc = true
  disableSpecial1stPost = false
  disableScrollToTop = false
  comments = false
  hidemeta = false
  hideSummary = false
  showtoc = true
  tocopen = false

  [params.assets]
    disableHLJS = false
    theme_color = "#B5502D"
    msapplication_TileColor = "#B5502D"

  [params.homeInfoParams]
    Title = "Путь к офферу"
    Content = "Личный путь поиска работы в России: IT и смежные специальности, удалённая работа и фриланс. Реальные цифры, реальный опыт — без общих советов."

  [params.cover]
    hidden = false
    hiddenInList = false
    hiddenInSingle = false

  # Google Search Console: вставьте код верификации сюда, когда заведёте сайт в Search Console
  # (Настройки → см. https://search.google.com/search-console)
  [params.analytics.google]
    SiteVerificationTag = ""

[menu]
  [[menu.main]]
    identifier = "posts"
    name = "Статьи"
    url = "/posts/"
    weight = 10
  [[menu.main]]
    identifier = "about"
    name = "Обо мне"
    url = "/about/"
    weight = 20
  [[menu.main]]
    identifier = "search"
    name = "Поиск"
    url = "/search/"
    weight = 30

[outputs]
  home = ["HTML", "RSS", "JSON"]

[markup]
  [markup.highlight]
    noClasses = false
  [markup.goldmark.renderer]
    unsafe = true

[taxonomies]
  tag = "tags"
